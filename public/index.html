<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>건물 데이터 대량 조회</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="page">

    <!-- ── 헤더 ── -->
    <header class="header">
        <div class="header-left">
            <span class="logo-icon">🏢</span>
            <div>
                <div class="logo-title">건물 데이터 대량 조회</div>
                <div class="logo-sub">카카오 주소 + 건축물대장 기반 건물명·주용도 일괄 조회</div>
            </div>
        </div>
        <div id="health-badge" class="health-badge">서버 확인 중…</div>
    </header>

    <!-- ── 입력 영역 ── -->
    <section class="card" id="section-input">

        <!-- 탭 -->
        <div class="tab-bar">
            <button class="tab active" data-tab="paste">📋 텍스트 붙여넣기</button>
            <button class="tab" data-tab="file">📁 파일 업로드</button>
        </div>

        <!-- 붙여넣기 탭 -->
        <div class="tab-panel" id="tab-paste">
            <label class="field-label">도로명주소 또는 지번주소를 한 줄에 하나씩 입력하세요</label>
            <textarea id="input-textarea" placeholder="경기 성남시 분당구 판교역로 235&#10;서울 강남구 테헤란로 152&#10;경기 수원시 영통구 광교중앙로 145&#10;..."></textarea>
            <div class="input-meta">
                <span id="paste-count" class="count-badge">0개</span>
                <button class="btn-sm" id="btn-clear-paste">지우기</button>
            </div>
        </div>

        <!-- 파일 업로드 탭 -->
        <div class="tab-panel hidden" id="tab-file">
            <label class="field-label">CSV 또는 Excel 파일 — 첫 번째 열에 주소가 있어야 합니다</label>
            <div class="file-drop-zone" id="file-drop-zone">
                <input type="file" id="file-input" accept=".csv,.xlsx,.xls,.xlsm" />
                <div class="file-drop-inner">
                    <div class="file-icon">📄</div>
                    <div class="file-drop-text">파일을 드래그하거나 클릭해서 선택</div>
                    <div class="file-drop-hint">CSV, xlsx, xls 지원 · 최대 10MB</div>
                </div>
            </div>
            <div id="file-status" class="file-status hidden"></div>
        </div>

        <!-- 옵션 + 실행 버튼 -->
        <div class="action-row">
            <div class="option-group">
                <label class="option-label">요청 간격</label>
                <select id="cfg-delay">
                    <option value="300">빠름 (0.3초)</option>
                    <option value="500" selected>보통 (0.5초)</option>
                    <option value="1000">안전 (1초)</option>
                </select>
            </div>
            <button class="btn-primary" id="btn-run">🔍 조회 시작</button>
        </div>
    </section>

    <!-- ── 진행 영역 ── -->
    <section class="card hidden" id="section-progress">
        <div class="progress-header">
            <span class="progress-label">조회 중…</span>
            <span id="progress-text" class="progress-count">0 / 0</span>
        </div>
        <div class="progress-track">
            <div id="progress-bar" class="progress-fill" style="width:0%"></div>
        </div>
        <div id="progress-log" class="progress-log"></div>
    </section>

    <!-- ── 결과 영역 ── -->
    <section class="card hidden" id="section-result">
        <div class="result-header">
            <div class="result-title">
                조회 결과
                <span id="result-summary" class="result-summary"></span>
            </div>
            <div class="result-actions">
                <button class="btn-sm" id="btn-copy-table" title="전체 테이블 복사 (탭 구분)">📋 전체 복사</button>
                <button class="btn-sm" id="btn-download-csv">⬇️ CSV 다운로드</button>
                <button class="btn-sm btn-outline" id="btn-reset">↩ 처음부터</button>
            </div>
        </div>

        <!-- 필터 -->
        <div class="filter-row">
            <label class="filter-chk">
                <input type="checkbox" id="filter-errors-only" /> 오류만 보기
            </label>
            <span class="filter-sep">|</span>
            <input type="text" id="filter-search" class="filter-search" placeholder="주소 검색…" />
        </div>

        <div class="table-wrap">
            <table id="result-table">
                <thead>
                    <tr>
                        <th class="th-num">#</th>
                        <th>입력 주소</th>
                        <th>표준 도로명주소</th>
                        <th>건물명(카카오)</th>
                        <th>주용도 원본</th>
                        <th>주용도</th>
                        <th class="th-status">상태</th>
                    </tr>
                </thead>
                <tbody id="result-tbody"></tbody>
            </table>
        </div>
    </section>

</div>

<div id="toast" class="toast hidden"></div>

<script src="app.js"></script>
</body>
</html>
